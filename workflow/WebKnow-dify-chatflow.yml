    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 从 sitemap 选择文章 URL
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: deepseek-v4-flash
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: 1744b4e0-5937-4352-aaed-4c4a77da5818
          role: system
          text: '你是一个严格的网站文章 URL 选择器。

            你的任务是根据用户问题，从 sitemap 内容中选择最适合回答该问题的一篇文章详情页 URL。

            用户问题：

            {{{#sys.query#}}

            sitemap 内容：

            {{{#1782718411995.text#}}

            选择规则：

            只能选择 murraytsai.github.io 域名下的 URL。

            必须优先选择具体文章详情页 URL。

            不要选择首页、标签页、分类页、归档页、分页页、关于页、友情链接页。

            如果 URL 中包含 /tags/、/categories/、/archives/、/page/、/about/、/links/，不要选择。

            如果用户问题是某个概念、教程、操作方法，请优先选择标题或 URL 中最相关的文章。

            如果多个文章 URL 都可能相关，选择最直接、最具体、最可能回答用户问题的那一个。

            如果没有合适的文章详情页 URL，只输出 NO_URL。

            输出规则：

            最终只能输出一个完整 URL 或 NO_URL。

            不要输出解释。

            不要输出分析过程。

            不要输出 标签。

            不要输出 Markdown。

            不要输出引号。

            不要输出“我选择的是”之类的文字。

            不要输出多个 URL。

            不要换行。

            不要输出任何多余文字。

            正确输出示例：

            https://murraytsai.github.io/2026/06/17/example/

            错误输出示例：

            ...https://murraytsai.github.io/example/

            我认为最相关的是：https://murraytsai.github.io/example/

            [https://murraytsai.github.io/example/]

            请严格只输出 URL 或 NO_URL。'
