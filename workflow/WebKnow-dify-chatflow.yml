    - data:
        code: "import re\nfrom urllib.parse import urlsplit, urlunsplit, quote, unquote\n\
          \nDOMAIN = \"https://murraytsai.github.io\"\n\nBLOCKED_PATHS = [\n    \"\
          /tags/\",\n    \"/categories/\",\n    \"/archives/\",\n    \"/page/\",\n\
          \    \"/about\",\n    \"/links\",\n]\n\n\ndef clean_url(candidate):\n  \
          \  if not candidate:\n        return None\n\n    candidate = candidate.strip()\n\
          \n    # 找到域名开始的位置，去掉前面的解释文字\n    index = candidate.find(DOMAIN)\n    if\
          \ index == -1:\n        return None\n\n    candidate = candidate[index:]\n\
          \n    # 去掉包裹符号和句尾符号\n    candidate = candidate.strip()\n    candidate =\
          \ candidate.strip(\"`\\\"'<>\")\n    candidate = candidate.rstrip(\"。.,，)）]】\"\
          )\n\n    if not candidate.startswith(DOMAIN):\n        return None\n\n \
          \   lower_url = candidate.lower()\n\n    # 排除标签页、分类页、归档页等非文章页\n    for blocked\
          \ in BLOCKED_PATHS:\n        if blocked in lower_url:\n            return\
          \ None\n\n    try:\n        parts = urlsplit(candidate)\n\n        # 修复中文、空格等特殊字符，保证是合法\
          \ URL\n        path = quote(unquote(parts.path), safe=\"/%:@\")\n      \
          \  query = quote(unquote(parts.query), safe=\"=&%/?+:\")\n\n        cleaned\
          \ = urlunsplit(\n            (\n                parts.scheme,\n        \
          \        parts.netloc,\n                path,\n                query,\n\
          \                \"\",\n            )\n        )\n\n        return cleaned\n\
          \n    except Exception:\n        return None\n\n\ndef main(arg1):\n    if\
          \ not arg1:\n        return {\"result\": \"NO_URL\"}\n\n    raw_text = str(arg1)\n\
          \n    # 先删除 <think>...</think> 内容\n    text = re.sub(\n        r\"<think>.*?</think>\"\
          ,\n        \"\",\n        raw_text,\n        flags=re.DOTALL | re.IGNORECASE,\n\
          \    ).strip()\n\n    # 如果删除后为空，就用原始文本兜底\n    if not text:\n        text\
          \ = raw_text\n\n    # 如果模型明确输出 NO_URL，且没有 URL，就返回 NO_URL\n    if \"NO_URL\"\
          \ in text and DOMAIN not in text:\n        return {\"result\": \"NO_URL\"\
          }\n\n    # 提取 murraytsai.github.io 下的 URL\n    candidates = re.findall(\n\
          \        r\"https?://murraytsai\\.github\\.io/[^\\s<>'\\\"\\]\\)）】]+\",\n\
          \        text,\n    )\n\n    # 兜底：逐行检查\n    for line in text.splitlines():\n\
          \        if DOMAIN in line:\n            candidates.append(line.strip())\n\
          \n    # 从后往前取，因为 LLM 通常最后给出最终答案\n    for candidate in reversed(candidates):\n\
          \        url = clean_url(candidate)\n        if url:\n            return\
          \ {\"result\": url}\n\n    return {\"result\": \"NO_URL\"}"
